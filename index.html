<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Survivor</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

#ui{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:20px;
}

canvas{
    background:#1a1a1a;
    display:block;
    margin:auto;
    border:2px solid #444;
}
</style>
</head>
<body>

<div id="ui">
HP: <span id="hp">100</span>　
Score: <span id="score">0</span>
</div>

<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let bullets = [];
let enemies = [];
let score = 0;
let spawnTimer = 0;
let shootTimer = 0;

const player = {
    x:400,
    y:300,
    size:15,
    speed:4,
    hp:100
};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function spawnEnemy(){

    const side = Math.floor(Math.random()*4);

    let x,y;

    if(side===0){ x=Math.random()*800; y=-20; }
    if(side===1){ x=820; y=Math.random()*600; }
    if(side===2){ x=Math.random()*800; y=620; }
    if(side===3){ x=-20; y=Math.random()*600; }

    enemies.push({
        x,y,
        size:12,
        speed:1+Math.random()*0.5
    });
}

function shoot(){

    let nearest=null;
    let dist=99999;

    enemies.forEach(e=>{
        let d=Math.hypot(e.x-player.x,e.y-player.y);
        if(d<dist){
            dist=d;
            nearest=e;
        }
    });

    if(!nearest) return;

    let angle=Math.atan2(nearest.y-player.y,nearest.x-player.x);

    bullets.push({
        x:player.x,
        y:player.y,
        vx:Math.cos(angle)*6,
        vy:Math.sin(angle)*6,
        size:5
    });
}

function update(){

    if(keys["ArrowUp"]||keys["w"]) player.y-=player.speed;
    if(keys["ArrowDown"]||keys["s"]) player.y+=player.speed;
    if(keys["ArrowLeft"]||keys["a"]) player.x-=player.speed;
    if(keys["ArrowRight"]||keys["d"]) player.x+=player.speed;

    player.x=Math.max(0,Math.min(800,player.x));
    player.y=Math.max(0,Math.min(600,player.y));

    spawnTimer++;
    if(spawnTimer>40){
        spawnEnemy();
        spawnTimer=0;
    }

    shootTimer++;
    if(shootTimer>20){
        shoot();
        shootTimer=0;
    }

    bullets.forEach(b=>{
        b.x+=b.vx;
        b.y+=b.vy;
    });

    enemies.forEach(e=>{
        let angle=Math.atan2(player.y-e.y,player.x-e.x);
        e.x+=Math.cos(angle)*e.speed;
        e.y+=Math.sin(angle)*e.speed;
    });

    bullets.forEach((b,bi)=>{
        enemies.forEach((e,ei)=>{
            let d=Math.hypot(b.x-e.x,b.y-e.y);
            if(d<b.size+e.size){
                enemies.splice(ei,1);
                bullets.splice(bi,1);
                score++;
            }
        });
    });

    enemies.forEach(e=>{
        let d=Math.hypot(player.x-e.x,player.y-e.y);
        if(d<player.size+e.size){
            player.hp-=0.2;
        }
    });

    document.getElementById("hp").textContent=Math.floor(player.hp);
    document.getElementById("score").textContent=score;

    if(player.hp<=0){
        alert("Game Over\nScore:"+score);
        location.reload();
    }
}

function draw(){

    ctx.clearRect(0,0,800,600);

    ctx.fillStyle="cyan";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
        ctx.fill();
    });
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
